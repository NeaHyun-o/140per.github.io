<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#f0f0f0}
#map{width:100%;height:100vh}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 6px rgba(0,0,0,.15)!important;border-radius:10px!important;overflow:hidden}
.leaflet-control-zoom a{width:34px!important;height:34px!important;line-height:34px!important;font-size:18px!important;color:#333!important;background:#fff!important;border:none!important}
.leaflet-control-zoom a:hover{background:#f5f5f5!important}

.info-panel{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.1);transition:transform .35s ease;transform:translateY(calc(100% - 70px))}
.info-panel.open{transform:translateY(0)}
.panel-handle{display:flex;justify-content:center;padding:10px 0 6px;cursor:pointer}
.panel-handle span{width:40px;height:4px;border-radius:2px;background:#ccc}
.panel-peek{display:flex;align-items:center;justify-content:space-between;padding:0 20px 12px}
.panel-peek h2{font-size:16px;color:#222}
.panel-peek .tag{background:#e8f8e0;color:#1ec800;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}

.panel-body{padding:0 20px 24px;max-height:60vh;overflow-y:auto}
.panel-addr{color:#888;font-size:13px;margin-bottom:8px}
.panel-desc{color:#555;font-size:13px;line-height:1.6;margin-bottom:14px}
.photo-grid{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:14px}
.photo-grid::-webkit-scrollbar{display:none}
.photo-grid img{width:200px;height:140px;object-fit:cover;border-radius:12px;scroll-snap-align:start;flex-shrink:0}
.naver-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:#1ec800;color:#fff;border-radius:12px;text-decoration:none;font-size:14px;font-weight:600;margin-top:4px}
.naver-btn:hover{background:#17a800}
.naver-btn svg{width:18px;height:18px;fill:#fff}

.custom-popup .leaflet-popup-content-wrapper{border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:0}
.custom-popup .leaflet-popup-content{margin:12px 16px;font-size:13px}
.custom-popup .leaflet-popup-tip{box-shadow:none}
</style>
</head>
<body>
<div id="map"></div>
<div class="info-panel" id="panel">
  <div class="panel-handle" id="handle"><span></span></div>
  <div class="panel-peek" id="peek">
    <h2 id="p-name"></h2>
    <span class="tag" id="p-tag"></span>
  </div>
  <div class="panel-body">
    <div class="panel-addr" id="p-addr"></div>
    <div class="panel-desc" id="p-desc"></div>
    <div class="photo-grid" id="p-photos"></div>
    <a class="naver-btn" id="p-naver" href="#" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.22.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      네이버 지도에서 보기
    </a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var places=[{
  name:"호텔포레 더 스파",
  address:"부산시 동구 중앙대로 296번길 6",
  lat:35.1200,lng:129.0410,
  tag:"숙소",
  description:"부산역 근처, 초량역 12번 출구 도보 2분. 히노끼탕과 테라스 스파룸이 유명한 호텔.",
  naverUrl:"https://map.naver.com/p/search/호텔포레%20더%20스파%20부산",
  photos:[
    "https://www.hotelforet.com/HotelForetSpa_common/images/homepage/KOR/main/main_slide05_m.jpg",
    "https://www.hotelforet.com/HotelForetSpa_common/images/homepage/KOR/main/main_slide06_m.jpg",
    "https://www.hotelforet.com/HotelForetSpa_common/images/homepage/KOR/main/main_slide07_m.jpg",
    "https://www.hotelforet.com/HotelForetSpa_common/images/homepage/KOR/main/room7.jpg",
    "https://www.hotelforet.com/HotelForetSpa_common/images/homepage/KOR/main/room8.jpg"
  ]
}];

var map=L.map('map',{zoomControl:false}).setView([places[0].lat,places[0].lng],15);
L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

var icon=L.divIcon({
  className:'',
  html:'<svg width="40" height="50" viewBox="0 0 32 42" xmlns="http://www.w3.org/2000/svg"><path d="M16 0C7.164 0 0 7.164 0 16c0 12 16 26 16 26s16-14 16-26C32 7.164 24.836 0 16 0z" fill="#1ec800"/><circle cx="16" cy="15" r="7" fill="#fff"/></svg>',
  iconSize:[40,50],iconAnchor:[20,50],popupAnchor:[0,-50]
});

var panel=document.getElementById('panel');
var handle=document.getElementById('handle');
var peek=document.getElementById('peek');

function showPanel(p){
  document.getElementById('p-name').textContent=p.name;
  document.getElementById('p-tag').textContent=p.tag;
  document.getElementById('p-addr').textContent=p.address;
  document.getElementById('p-desc').textContent=p.description;
  document.getElementById('p-naver').href=p.naverUrl;
  var ph=document.getElementById('p-photos');
  ph.innerHTML='';
  p.photos.forEach(function(src){
    var img=document.createElement('img');
    img.src=src;img.alt=p.name;img.loading='lazy';
    img.onerror=function(){this.style.display='none'};
    ph.appendChild(img);
  });
  panel.classList.add('open');
}

handle.addEventListener('click',function(){panel.classList.toggle('open')});
peek.addEventListener('click',function(){panel.classList.toggle('open')});

places.forEach(function(p){
  var m=L.marker([p.lat,p.lng],{icon:icon}).addTo(map);
  m.on('click',function(){showPanel(p);map.flyTo([p.lat,p.lng],16,{duration:0.5})});
});

map.on('click',function(){panel.classList.remove('open')});

showPanel(places[0]);
setTimeout(function(){panel.classList.remove('open')},2000);
</script>
</body>
</html>
